<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudeWatch — Know your Claude limits before they know you</title>
  <meta name="description" content="ClaudeWatch puts your Claude session and weekly usage right in the menu bar. Always visible, always current. Free on GitHub or pay what you can.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:     #0D9488;
      --accent-hover: #0F766E;
      --bg:         #0a0a0f;
      --surface:    #1c1c1e;
      --border:     #2d2d2d;
      --text:       #f5f5f5;
      --muted:      #9ca3af;
      --radius:     12px;
      --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    section {
      padding: 5rem 0;
    }

    /* ── Typography ── */
    h1 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h2 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      display: inline-block;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.75rem 0;
      text-decoration: none;
      transition: color 0.15s;
    }
    .btn-ghost:hover { color: var(--text); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    /* ── Screenshot images ── */
    .screenshot {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── Nav ── */
    nav {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    nav .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      text-decoration: none;
    }
    .nav-brand .dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      section { padding: 3rem 0; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="container">
      <a href="/" class="nav-brand">
        <span class="dot"></span>
        ClaudeWatch
      </a>
      <ul class="nav-links">
        <li><a href="https://github.com/katebspurr-png/ClaudeWatch">GitHub</a></li>
      </ul>
    </div>
  </nav>

</body>
</html>
